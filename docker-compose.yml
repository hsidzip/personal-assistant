version: '3.8'

services:
  db:
    image: postgres:15
    container_name: assistant-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: assistant_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d assistant_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: assistant-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/assistant_db
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      # Показывает SQL логи в терминале, чтобы мы видели, создаются ли таблицы
      - SPRING_JPA_SHOW_SQL=true
      - GROQ_API_KEY=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

volumes:
  db_data: