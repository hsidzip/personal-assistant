<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация | AI Assistant</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1e1e1e; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: #2d2d2d; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 300px; text-align: center; }
        h2 { margin-bottom: 1.5rem; color: #27ae60; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #333; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #27ae60; border: none; color: white; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        button:hover { background: #219150; }
        a { color: #888; text-decoration: none; font-size: 0.8rem; margin-top: 15px; display: block; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Регистрация</h2>
        <input type="text" id="username" placeholder="Придумайте логин" required>
        <input type="email" id="email" placeholder="Введите ваш Email" required> 
        <input type="password" id="password" placeholder="Придумайте пароль" required>
        
        <button onclick="register()">Создать аккаунт</button>
        <a href="login.html">Уже есть аккаунт? Войти</a>
    </div>

    <script>
        async function register() {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value; // Забираем email
            const password = document.getElementById('password').value;

            if (!username || !email || !password) {
                alert("Пожалуйста, заполните все поля");
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // Отправляем email вместе с остальными данными
                    body: JSON.stringify({ username, email, password }) 
                });

                if (response.ok) {
                    alert('Успешно! Теперь войдите.');
                    window.location.href = 'login.html';
                } else { 
                    const errorData = await response.json().catch(() => ({}));
                    console.error("Server error:", errorData);
                    alert('Ошибка при регистрации. Проверьте логи сервера.'); 
                }
            } catch (e) { 
                console.error("Fetch error:", e);
                alert('Ошибка сервера'); 
            }
        }
    </script>
</body>
</html>
