<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script>
        if (!localStorage.getItem('jwtToken')) {
            window.location.href = 'login.html';
        }
    </script>

    <div id="chat-page">
        <div class="sidebar">
            <h3>Personal Assistant</h3>
            <p style="font-size: 0.8rem; color: #888;">ИИ-ассистент на Spring Boot</p>
            <button id="new-chat-btn" style="width: 100%; padding: 10px; background: #444; border: none; color: #fff; border-radius: 5px; margin-bottom: 20px; cursor: pointer;">+ Новый разговор</button>
            <div id="conversation-list"></div>
            <div style="margin-top: auto; border-top: 1px solid #444; padding-top: 10px;">
                <p id="user-display">Загрузка...</p>
                <button id="logout-btn" style="width: 100%; background: #c0392b; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer;">Выйти</button>
            </div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <h2>Диалог</h2>
                <span style="background: #27ae60; padding: 2px 8px; border-radius: 10px; font-size: 0.8rem;">llama-3.1</span>
            </div>
            <div id="chat-messages">
                <div class="message assistant">Привет! Я твой персональный ИИ-ассистент. Чем могу помочь?</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="message-input" placeholder="Напишите сообщение..." autocomplete="off">
                <button id="send-btn">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const userDisplay = document.getElementById('user-display');
        const newChatBtn = document.getElementById('new-chat-btn');
        const conversationList = document.getElementById('conversation-list');

        let currentConversationId = null;
        userDisplay.innerText = localStorage.getItem('username') || 'Пользователь';

        // Первичная загрузка
        loadConversations();

        newChatBtn.addEventListener('click', () => {
            currentConversationId = null;
            chatMessages.innerHTML = `<div class="message assistant">Начат новый разговор. Чем я могу помочь?</div>`;
            document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = 'login.html';
        });

        async function loadConversations() {
            const currentToken = localStorage.getItem('jwtToken');
            try {
                const response = await fetch('/api/chat/conversations', {
                    headers: { 'Authorization': 'Bearer ' + currentToken }
                });
                if (response.ok) {
                    const conversations = await response.json();
                    conversationList.innerHTML = '';
                    conversations.forEach(conv => {
                        const btn = document.createElement('div');
                        btn.className = 'conversation-item';
                        btn.innerText = conv.title || ("Чат #" + conv.id);
                        btn.onclick = () => selectConversation(conv.id, btn);
                        conversationList.appendChild(btn);
                    });
                }
            } catch (error) { console.error(error); }
        }

        async function selectConversation(id, element) {
            const currentToken = localStorage.getItem('jwtToken');
            currentConversationId = id;
            document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            try {
                const response = await fetch(`/api/chat/conversations/${id}/messages`, {
                    headers: { 'Authorization': 'Bearer ' + currentToken }
                });
                if (response.ok) {
                    const messages = await response.json();
                    chatMessages.innerHTML = '';
                    messages.forEach(msg => addMessage(msg.content, msg.role));
                }
            } catch (error) { console.error(error); }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            const currentToken = localStorage.getItem('jwtToken');
            if (!message || !currentToken) return;

            addMessage(message, 'user');
            messageInput.value = '';
            const loadingMsg = addMessage('...', 'assistant loading');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + currentToken
                    },
                    body: JSON.stringify({ message, conversationId: currentConversationId })
                });
                loadingMsg.remove();
                if (response.ok) {
                    const data = await response.json();
                    if (currentConversationId === null) {
                        currentConversationId = data.conversationId;
                        loadConversations();
                    }
                    addMessage(data.response, 'assistant');
                }
            } catch (error) { loadingMsg.remove(); }
        }

        function addMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + type;
            msgDiv.innerText = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return msgDiv;
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
