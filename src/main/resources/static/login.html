<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход - Personal Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <form class="auth-form" id="login-form">
            <h2>Вход</h2>
            <input type="text" id="username" placeholder="Логин" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
            <p>Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
            <p id="error-msg" style="color: red; display: none;"></p>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    // ИСПРАВЛЕНИЕ ТУТ: Парсим как JSON
                    const data = await response.json(); 
                    
                    // Сохраняем ТОЛЬКО строку токена, а не весь объект
                    localStorage.setItem('jwtToken', data.token); 
                    localStorage.setItem('username', username);
                    
                    window.location.href = 'index.html';
                } else {
                    errorMsg.innerText = 'Неверный логин или пароль';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error("Login error:", error);
                errorMsg.innerText = 'Ошибка соединения с сервером';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
