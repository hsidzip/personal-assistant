<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход | AI Assistant</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1e1e1e; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: #2d2d2d; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 300px; text-align: center; }
        h2 { margin-bottom: 1.5rem; color: #4a90e2; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #333; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #4a90e2; border: none; color: white; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        button:hover { background: #357abd; }
        a { color: #888; text-decoration: none; font-size: 0.8rem; margin-top: 15px; display: block; }
        a:hover { color: #4a90e2; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Вход</h2>
        <input type="text" id="username" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <a href="register.html">Нет аккаунта? Зарегистрироваться</a>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('jwtToken', data.token);
                    localStorage.setItem('username', username);
                    window.location.href = 'index.html';
                } else { alert('Неверный логин или пароль'); }
            } catch (e) { alert('Ошибка сервера'); }
        }
    </script>
</body>
</html>
