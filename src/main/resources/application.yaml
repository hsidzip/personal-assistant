spring:
  application:
    name: assistant

  datasource:
    url: jdbc:postgresql://localhost:5432/assistant_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: assistant-group
      auto-offset-reset: earliest

server:
  port: 8080

jwt:
  secret: mySecretKey12345678901234567890123456789012
  expiration: 86400000

groq:
  api:
    url: https://api.groq.com/openai/v1/chat/completions
    key: ${GROQ_API_KEY}
    model: llama-3.1-8b-instant